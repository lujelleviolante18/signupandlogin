<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="ex.css">
<title>VacayHub | Sign Up</title>
</head>

<script>
function togglePassword(id, el) {
    const input = document.getElementById(id);

    if (input.type === "password") {
        input.type = "text";

         el.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" 
        viewBox="0 0 24 24" fill="none" stroke="currentColor" 
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
            <circle cx="12" cy="12" r="3"/>
        </svg>`;
    } else {
        input.type = "password";

        // OPEN EYE
         el.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" 
        viewBox="0 0 24 24" fill="none" stroke="currentColor" 
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.77 21.77 0 0 1 5.06-5.94"/>
            <path d="M1 1l22 22"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a21.77 21.77 0 0 1-4.09 5.14"/>
        </svg>`;
    }
}
</script>

<body>

    <div class="bg">
    <img src="tkz6AEwJw9pfTYHsoJpRJo.jpg" alt="bg1">
    <img src="airbnb1.jpg" alt="bg2">
    <img src="TAL-header-airbnb-vermont-AIRBNBCNECTONS1025-d44e82ee7f3342f9b76e417f3e1482fb.jpg" alt="bg3">
</div>

<div class="card">
    <div class="logo">Bayanijuan Suites</div>
    <div class="subtitle">Create your account</div>

    <form>
        <label>Full Name</label>
        <input type="text" placeholder="Enter your full name" required>

        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
<div class="password-box">
    <input type="password" id="password" placeholder="Create password" required>
<span class="toggle" onclick="togglePassword('password', this)">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" 
    viewBox="0 0 24 24" fill="none" stroke="currentColor" 
    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
        <circle cx="12" cy="12" r="3"/>
    </svg>
</span></div>

<div class="password-box">
    <input type="password" id="confirmPassword" placeholder="Confirm password" required>
<span class="toggle" onclick="togglePassword('confirmPassword', this)">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" 
    viewBox="0 0 24 24" fill="none" stroke="currentColor" 
    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
        <circle cx="12" cy="12" r="3"/>
    </svg>
</span></div>
        <button type="submit">Sign Up</button>

        <div class="footer">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </form>
</div>

</body>
</html>
